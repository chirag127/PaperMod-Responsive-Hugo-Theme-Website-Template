# badges.yml
# Configuration for dynamic badges (Shields.io) generated by Apex Technical Authority.
# Repository: PaperMod-Responsive-Hugo-Theme-Website-Template
# User: chirag127

# Base URL setup for dynamic links
repo_owner: "chirag127"
repo_name: "PaperMod-Responsive-Hugo-Theme-Website-Template"
base_url: "https://img.shields.io/github/stars/${{ repo_owner }}/${{ repo_name }}?style=flat-square&logo=github"

badges:
  # 1. Build Status (CI)
  - name: "Build Status"
    key: "build-status"
    markdown: "[![Build Status](https://img.shields.io/github/actions/workflow/status/${{ repo_owner }}/${{ repo_name }}/ci.yml?event=push&style=flat-square)](https://github.com/${{ repo_owner }}/${{ repo_name }}/actions/workflows/ci.yml)"
    url_template: "https://img.shields.io/github/actions/workflow/status/${{ repo_owner }}/${{ repo_name }}/ci.yml?event=push&style=flat-square"

  # 2. Code Coverage (Placeholder - Assuming integration with Codecov)
  - name: "Code Coverage"
    key: "coverage"
    markdown: "[![Code Coverage](https://img.shields.io/codecov/c/github/${{ repo_owner }}/${{ repo_name }}?style=flat-square)](https://codecov.io/gh/${{ repo_owner }}/${{ repo_name }})"
    url_template: "https://img.shields.io/codecov/c/github/${{ repo_owner }}/${{ repo_name }}?style=flat-square"

  # 3. Primary Language (HTML/Go template for Hugo)
  - name: "Primary Language"
    key: "language"
    markdown: "[![Primary Language](https://img.shields.io/github/languages/top/chirag127/PaperMod-Responsive-Hugo-Theme-Website-Template?style=flat-square&color=blue&logo=html5)]"
    url_template: "https://img.shields.io/github/languages/top/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=blue&logo=html5"

  # 4. License
  - name: "License"
    key: "license"
    markdown: "[![License](https://img.shields.io/github/license/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=9747FF)]"
    url_template: "https://img.shields.io/github/license/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=9747FF"

  # 5. GitHub Stars
  - name: "GitHub Stars"
    key: "stars"
    markdown: "[![GitHub Stars](https://img.shields.io/github/stars/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=yellow&logo=star)](https://github.com/${{ repo_owner }}/${{ repo_name }})"
    url_template: "https://img.shields.io/github/stars/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=yellow&logo=star"

  # 6. Repository Age (Based on first commit)
  - name: "Repo Age"
    key: "created"
    markdown: "[![Repository Created](https://img.shields.io/github/creation-date/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=brightgreen&label=Created)]"
    url_template: "https://img.shields.io/github/creation-date/${{ repo_owner }}/${{ repo_name }}?style=flat-square&color=brightgreen&label=Created"
